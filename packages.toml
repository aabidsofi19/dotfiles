# packages.toml
# Canonical list of every program this setup needs.
# The install scripts (scripts/install-*.sh) parse this file directly.
#
# FORMAT
# ------
# [section]           Category header (for humans, ignored by scripts)
#
# Package lines:
#   pkg = "name"                    Same name on all package managers
#   pkg = "name"  dnf = "other"     Different name on Fedora
#   pkg = "name"  brew = "other"    Different name on macOS
#   pkg = "name"  dnf = "-"         Skip on Fedora (- means skip)
#   pkg = "name"  brew = "-"        Skip on macOS
#
# Non-OS packages (npm, go, cargo) use their own sections and are
# installed by dedicated functions in the install scripts.

# ── Core ────────────────────────────────────────────────────────────

[core]
pkg = "zsh"
pkg = "fish"
pkg = "neovim"
pkg = "git"
pkg = "stow"
pkg = "curl"
pkg = "wget"

# ── Terminal ────────────────────────────────────────────────────────

[terminal]
pkg = "ghostty"
pkg = "starship"

# ── CLI tools ───────────────────────────────────────────────────────

[cli]
pkg = "ripgrep"
pkg = "fd-find"                     brew = "fd"
pkg = "bat"
pkg = "eza"
pkg = "fzf"
pkg = "zoxide"
pkg = "jq"
pkg = "btop"
pkg = "tree"
pkg = "tmux"

# ── Dev languages ───────────────────────────────────────────────────

[languages]
pkg = "golang"                      brew = "go"
pkg = "zig"
pkg = "gcc"
pkg = "clang"                       brew = "llvm"
pkg = "make"
pkg = "cmake"

# ── LSP & formatters ───────────────────────────────────────────────

[lsp]
pkg = "lua-language-server"
pkg = "stylua"                      dnf = "-"

# ── Containers ──────────────────────────────────────────────────────

[containers]
pkg = "podman"                      brew = "-"
pkg = "kubectl"                     dnf = "kubernetes-client"

# ── Wayland / niri ──────────────────────────────────────────────────

[wayland]
pkg = "niri"                        dnf = "-"
pkg = "waybar"
pkg = "fuzzel"
pkg = "mako"
pkg = "swaylock"
pkg = "swayidle"
pkg = "swaybg"
pkg = "xwayland-satellite"         dnf = "-"
pkg = "xdg-desktop-portal-gtk"
pkg = "xdg-desktop-portal-gnome"
pkg = "gnome-keyring"
pkg = "brightnessctl"
pkg = "playerctl"
pkg = "wl-clipboard"

# ── Zsh plugins ─────────────────────────────────────────────────────

[zsh_plugins]
pkg = "zsh-autosuggestions"
pkg = "zsh-syntax-highlighting"

# ── npm globals (installed via npm/bun, not OS package manager) ─────

[npm]
pkg = "@fsouza/prettierd"

# ── Go tools (installed via go install) ─────────────────────────────

[go]
pkg = "golang.org/x/tools/cmd/goimports@latest"
pkg = "mvdan.cc/gofumpt@latest"

# ── Cargo tools (installed via cargo install) ───────────────────────

[cargo]
pkg = "stylua"
